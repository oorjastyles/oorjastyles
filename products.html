<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oorja Styles - Products</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      background-color: #0d0d0d;
      color: white;
      overflow-x: hidden;
    }

    .topbar {
      width: 100%;
      background: #111;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #222;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1100;
    }

    .topbar img {
      height: 32px;
      margin-right: 10px;
    }

    .topbar .brand {
      font-size: 1.4rem;
      font-weight: 700;
      color: #ff3c38;
      display: flex;
      align-items: center;
    }

    .sidebar {
      position: fixed;
      top: 60px;
      left: 0;
      height: calc(100% - 60px);
      width: 220px;
      background: #111;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      border-right: 1px solid #222;
      z-index: 1000;
    }

    .sidebar a {
      color: #ddd;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .sidebar a:hover {
      color: #ff3c38;
    }

    .menu-toggle {
      display: none;
      position: absolute;
      top: 15px;
      left: 20px;
      z-index: 1200;
      cursor: pointer;
      flex-direction: column;
      gap: 4px;
    }

    .menu-toggle div {
      width: 25px;
      height: 3px;
      background-color: white;
    }

    main {
      margin-left: 240px;
      padding: 100px 40px 40px;
    }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 50px;
      font-weight: 800;
    }

    .product-list {
      display: flex;
      flex-direction: column;
      gap: 40px;
      max-width: 900px;
      margin: 0 auto;
    }

    .product-card {
      display: flex;
      background: linear-gradient(145deg, #1a1a1a, #111);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.5);
      transition: 0.3s ease;
      height: 320px;
    }

    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 30px rgba(255, 60, 56, 0.15);
    }

    .product-card img {
      width: 260px;
      height: 100%;
      object-fit: cover;
      border-right: 1px solid #222;
    }

    .product-details {
      flex: 1;
      padding: 30px 25px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .product-details h3 {
      font-size: 1.7rem;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .product-details p {
      margin-bottom: 18px;
      color: #ff3c38;
      font-size: 1.2rem;
      font-weight: 600;
    }

    .product-details button {
      padding: 12px 24px;
      background-color: #ff3c38;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .product-details button:hover {
      background-color: #e12b2b;
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s;
      }

      .sidebar.active {
        transform: translateX(0);
      }

      .menu-toggle {
        display: flex;
      }

      main {
        margin-left: 0;
        padding: 120px 20px 40px;
      }

      .product-card {
        flex-direction: column;
        height: auto;
      }

      .product-card img {
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid #222;
      }

      .product-details {
        padding: 20px;
        height: auto;
      }
    }

    /* Popup Styles */
    #buyPopup {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(5px);
      background-color: rgba(0, 0, 0, 0.6);
      animation: fadeIn 0.3s ease;
    }

    .popup-content {
      background: #181818;
      color: white;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
      width: 90%;
      max-width: 400px;
      margin: 10% auto;
      text-align: center;
      position: relative;
      animation: slideUp 0.3s ease;
    }

    .popup-close {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 24px;
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
    }

    .popup-content h2 {
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .popup-content p {
      margin-bottom: 20px;
      font-size: 1rem;
      color: #ccc;
    }

    .popup-buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .popup-btn {
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.3s ease;
      display: block;
    }

    .popup-btn.email {
      background: #ff3c38;
      color: white;
    }

    .popup-btn.insta {
      background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      color: white;
    }

    .popup-btn:hover {
      opacity: 0.9;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <img src="logo.png" alt="Logo">
      Oorja Styles
    </div>
  </div>

  <div class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('active')">
    <div></div>
    <div></div>
    <div></div>
  </div>

  <nav class="sidebar" id="sidebar">
    <a href="index.html">Home</a>
    <a href="products.html">Collection</a>
    <a href="about.html">About Us</a>
    <a href="terms.html">Terms & Conditions</a>
    <a href="contact.html">Contact Us</a>
  </nav>

  <main>
    <h1>Our Products</h1>
    <div class="product-list">
      <div class="product-card">
        <img src="devilish.png" alt="Oversized Tee">
        <div class="product-details">
          <h3>Devilish Anime Graphic Tee</h3>
          <p>₹499</p>
          <button onclick="showPopup()">Buy Now</button>
        </div>
      </div>

      <div class="product-card">
        <img src="product.png" alt="Street Hoodie">
        <div class="product-details">
          <h3>Street Hoodie</h3>
          <p>₹1299</p>
          <button onclick="showPopup()">Buy Now</button>
        </div>
      </div>

      <div class="product-card">
        <img src="product.png" alt="Urban Cap">
        <div class="product-details">
          <h3>Urban Cap</h3>
          <p>₹499</p>
          <button onclick="showPopup()">Buy Now</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Buy Now Popup -->
  <div id="buyPopup">
    <div class="popup-content">
      <button class="popup-close" onclick="closePopup()">×</button>
      <h2>Ready to Buy?</h2>
      <p>Choose how you'd like to contact us:</p>
      <div class="popup-buttons">
        <a href="mailto:oorja.styles@gmail.com" class="popup-btn email">Email</a>
        <a href="https://instagram.com/oorjastyless.store" target="_blank" class="popup-btn insta">DM on Instagram</a>
      </div>
    </div>
  </div>

  <script>
    function showPopup() {
      document.getElementById('buyPopup').style.display = 'block';
    }
    function closePopup() {
      document.getElementById('buyPopup').style.display = 'none';
    }
    window.onclick = function(event) {
      const popup = document.getElementById('buyPopup');
      if (event.target == popup) {
        popup.style.display = "none";
      }
    }
  </script>
</body>
</html>
